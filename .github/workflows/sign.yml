name: Auto Sign

on:
  schedule:
    # 每6小时执行一次 (UTC 0:42, 6:42, 12:42, 18:42)
    - cron: '42 */6 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run sign
        env:
          TOKEN: ${{ secrets.TOKEN }}
          EXIT_WHEN_FAIL: on
        run: python nte.py