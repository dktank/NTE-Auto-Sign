name: Auto Sign

on:
  schedule:
    # 每6小时执行一次 (UTC 0:42, 6:42, 12:42, 18:42)
    - cron: '42 */6 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run sign
        env:
          TOKEN: ${{ secrets.TOKEN }}
          EXIT_WHEN_FAIL: on
        run: python nte.py

      - name: Update TOKEN secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -f new_token.txt ]; then
            NEW_TOKEN=$(cat new_token.txt)
            if [ -n "$NEW_TOKEN" ]; then
              echo "Updating TOKEN secret..."
              gh secret set TOKEN --body "$NEW_TOKEN"
              echo "TOKEN secret updated successfully!"
            fi
          else
            echo "No new token file found, skipping secret update"
          fi
